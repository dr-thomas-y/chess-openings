name: Auto-create PR for Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Create PR if no open PR exists
        run: |
          OPEN=$(gh api \
            "repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${{ github.ref_name }}&base=main&state=open" \
            --jq length)
          echo "Open PRs: $OPEN"
          if [ "$OPEN" = "0" ]; then
            gh api repos/${{ github.repository }}/pulls \
              -X POST \
              -f title="Auto: ${{ github.ref_name }}" \
              -f body="Auto-created PR" \
              -f head="${{ github.ref_name }}" \
              -f base="main"
            echo "PR created"
          else
            echo "Open PR already exists, skipping"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
