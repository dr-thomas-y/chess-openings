name: Auto-create PR for Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Create PR if no open PR exists
        run: |
          OPEN=$(gh pr list \
            --repo ${{ github.repository }} \
            --head ${{ github.ref_name }} \
            --base main \
            --state open \
            --json number \
            --jq length)
          if [ "$OPEN" = "0" ]; then
            gh pr create \
              --repo ${{ github.repository }} \
              --head ${{ github.ref_name }} \
              --base main \
              --title "Auto: ${{ github.ref_name }}" \
              --body "Auto-created PR for branch ${{ github.ref_name }}"
          else
            echo "Open PR already exists, skipping creation"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
