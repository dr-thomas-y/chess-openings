name: Auto-create PR for Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Create PR if not exists
        run: |
          gh pr create \
            --repo ${{ github.repository }} \
            --head ${{ github.ref_name }} \
            --base main \
            --title "Auto: ${{ github.ref_name }}" \
            --body "Auto-created PR for branch ${{ github.ref_name }}" \
          || echo "PR already exists, skipping"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
