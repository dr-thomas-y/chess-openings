name: Auto-create PR for Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-and-merge-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Create and merge PR
        run: |
          # Check for open PR
          OPEN=$(gh api \
            "repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${{ github.ref_name }}&base=main&state=open" \
            --jq length)
          echo "Open PRs: $OPEN"

          if [ "$OPEN" = "0" ]; then
            echo "Creating PR..."
            PR=$(gh api repos/${{ github.repository }}/pulls \
              -X POST \
              -f title="Auto: ${{ github.ref_name }}" \
              -f body="Auto-created PR" \
              -f head="${{ github.ref_name }}" \
              -f base="main" \
              --jq .number)
            echo "Created PR #$PR"
          else
            PR=$(gh api \
              "repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${{ github.ref_name }}&base=main&state=open" \
              --jq '.[0].number')
            echo "Using existing PR #$PR"
          fi

          echo "Merging PR #$PR..."
          gh api repos/${{ github.repository }}/pulls/$PR/merge \
            -X PUT \
            -f merge_method=merge
          echo "Done!"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
